<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="trophy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="trophyDark" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#047857"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a7f3d0" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a7f3d0" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Rounded square dark background -->
  <rect x="0" y="0" width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Left handle (drawn behind cup) -->
  <path d="
    M 168 152
    C 110 152 88 196 88 232
    C 88 274 124 296 168 300
    L 168 268
    C 142 264 124 250 124 230
    C 124 208 142 188 168 188
    Z" fill="url(#trophyDark)"/>

  <!-- Right handle (drawn behind cup) -->
  <path d="
    M 344 152
    C 402 152 424 196 424 232
    C 424 274 388 296 344 300
    L 344 268
    C 370 264 388 250 388 230
    C 388 208 370 188 344 188
    Z" fill="url(#trophyDark)"/>

  <!-- Cup body: tapered urn shape -->
  <path d="
    M 168 120
    L 344 120
    L 344 224
    C 344 304 312 360 256 360
    C 200 360 168 304 168 224
    Z" fill="url(#trophy)"/>

  <!-- Inner shadow at rim for depth -->
  <path d="
    M 168 120
    L 344 120
    L 344 138
    L 168 138
    Z" fill="#022c22" opacity="0.35"/>

  <!-- Specular highlight on cup -->
  <path d="
    M 196 144
    L 220 144
    L 220 232
    C 220 268 212 296 204 312
    C 198 296 196 268 196 232
    Z" fill="url(#shine)"/>

  <!-- "26" engraved on cup -->
  <text x="256" y="280"
    text-anchor="middle"
    font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', sans-serif"
    font-weight="900"
    font-size="116"
    fill="#022c22"
    opacity="0.55"
    letter-spacing="-4">26</text>

  <!-- Stem -->
  <path d="
    M 232 360
    L 280 360
    L 286 396
    L 226 396
    Z" fill="url(#trophy)"/>

  <!-- Base top plate -->
  <rect x="184" y="396" width="144" height="22" rx="4" fill="url(#trophyDark)"/>

  <!-- Base bottom plate -->
  <rect x="148" y="418" width="216" height="34" rx="8" fill="url(#trophy)"/>

  <!-- Subtle base shine -->
  <rect x="160" y="424" width="192" height="6" rx="3" fill="#a7f3d0" opacity="0.35"/>
</svg>
